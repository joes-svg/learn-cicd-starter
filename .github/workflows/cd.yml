name: cd

on:
  push:
    branches: [main]

jobs:
  Deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Build
        run: bash scripts/buildprod.sh

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
        with:
          version: ">= 363.0.0"

      - name: "Use gcloud CLI"
        run: "gcloud info"

      - name: build and push to gcloud
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-496714/notely-ar-repo/notely:latest --project notely-496714

      - name: "Run database migrations"
        run: bash scripts/migrate.sh

      - name: Deploy to gcloud
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-496714/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-496714 --max-instances=4
